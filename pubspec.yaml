name: real_reader
description: A cross-platform RSS reader with AI features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  go_router: ^13.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  supabase_flutter: ^2.3.0
  webfeed_revised: ^0.7.2
  xml: ^6.4.2
  http: ^1.1.0
  google_fonts: ^6.1.0
  uuid: ^4.2.1
  intl: ^0.18.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  flutter_svg: ^2.0.9
  flutter_tts: ^4.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  universal_platform: ^1.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
